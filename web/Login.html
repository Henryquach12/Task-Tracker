<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login.css">
    <style>
        .field-error {
            display: none;
            margin-top: 2px;
            font-size: 0.85rem;
            line-height: 1.1;
            color: #c62828;
        }
    </style>
</head>

<body>
    <form method="POST" action="http://localhost:8001/login">
        <h1>Login</h1>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password:</label>
        <div class="password-field">
            <input type="password" id="password" name="password" required>
            <button class="toggle-password" type="button" data-target="password" data-visible="false"
                aria-label="Show password" title="Show password">
                <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M12 5c5.5 0 9.8 4.6 10.9 6.2.2.3.2.7 0 1C21.8 13.8 17.5 18.4 12 18.4S2.2 13.8 1.1 12.2c-.2-.3-.2-.7 0-1C2.2 9.6 6.5 5 12 5Zm0 2C8 7 4.7 10.3 3.4 11.7 4.7 13.1 8 16.4 12 16.4s7.3-3.3 8.6-4.7C19.3 10.3 16 7 12 7Zm0 2.2a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z" />
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M3.3 4.7a1 1 0 0 1 1.4 0l16.6 16.6a1 1 0 1 1-1.4 1.4l-2.5-2.5c-1.6.8-3.4 1.2-5.4 1.2-5.5 0-9.8-4.6-10.9-6.2a1 1 0 0 1 0-1C2 12.7 4.4 10 7.6 8.3L3.3 4.7Zm6 6a3.5 3.5 0 0 0 4.9 4.9l-1.5-1.5a1.5 1.5 0 0 1-1.9-1.9l-1.5-1.5Zm3.7-3.6c1.2.2 2.3.8 3.2 1.7.9.9 1.5 2 1.7 3.2l-1.9-1.9a1.5 1.5 0 0 0-1.1-1.1L13 7.1Zm-1 0c-4 0-7.3 3.3-8.6 4.7.5.6 1.4 1.6 2.6 2.6l1.5-1.5a3.5 3.5 0 0 1 4.9-4.9l1.5-1.5c-1-.3-1.9-.4-1.9-.4Z" />
                </svg>
            </button>
        </div>
        <div id="password-error" class="field-error" role="status" aria-live="polite">Password is wrong</div>

        <button type="submit">Login</button>
        <p>Don't have an account? <a href="Registration.html">Register here</a></p>
    </form>
</body>

</html>

<script>
    (() => {
        const params = new URLSearchParams(window.location.search);
        const error = (params.get("error") || "").toLowerCase();
        if (error === "wrong_password" || error === "invalid" || error === "invalid_credentials") {
            const passwordError = document.getElementById("password-error");
            if (passwordError) passwordError.style.display = "block";
        }

        const button = document.querySelector(".toggle-password");
        const password = document.getElementById("password");

        if (!button || !password) return;

        const setState = (visible) => {
            button.dataset.visible = visible ? "true" : "false";
            const label = visible ? "Hide password" : "Show password";
            button.setAttribute("aria-label", label);
            button.setAttribute("title", label);
        };

        setState(password.type === "text");

        button.addEventListener("click", () => {
            const visible = password.type === "password";
            password.type = visible ? "text" : "password";
            setState(visible);
        });
    })();
</script>
